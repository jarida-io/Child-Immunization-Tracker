<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="-apple-system, Segoe UI, sans-serif">
  <rect width="1200" height="780" fill="#f7f9fb"/>
  <text x="40" y="50" fill="#0D6E6E" font-size="26" font-weight="700">Parent-Facing Channels</text>
  <text x="40" y="78" fill="#475569" font-size="14">SMS alert (smartphone or feature phone) · USSD menu (any phone, no internet)</text>

  <!-- SMS Phone mockup -->
  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="280" height="600" rx="36" fill="#1a1a1a"/>
    <rect x="12" y="12" width="256" height="576" rx="28" fill="#f5f5f7"/>
    <rect x="12" y="12" width="256" height="32" rx="28" fill="#f5f5f7"/>
    <text x="30"  y="33" fill="#000" font-size="11" font-weight="700">9:17</text>
    <text x="240" y="33" fill="#000" font-size="11" text-anchor="end">●●●●● 4G</text>

    <!-- Header -->
    <rect x="12" y="44" width="256" height="56" fill="white"/>
    <text x="140" y="68" text-anchor="middle" fill="#000" font-size="14" font-weight="700">ClimateShield</text>
    <text x="140" y="86" text-anchor="middle" fill="#666" font-size="11">+254 711 082 200</text>

    <!-- Message 1 -->
    <rect x="24" y="120" width="232" height="160" rx="14" fill="#e5e5ea"/>
    <text x="34" y="142" fill="#000" font-size="11.5" font-weight="700">🚨 CLIMATE ALERT — Kisumu</text>
    <text x="34" y="160" fill="#000" font-size="11">High cholera and malaria risk</text>
    <text x="34" y="175" fill="#000" font-size="11">detected in next 7-14 days</text>
    <text x="34" y="190" fill="#000" font-size="11">(74mm rainfall forecast).</text>
    <text x="34" y="216" fill="#000" font-size="11">Your child ZURI has 8 missed</text>
    <text x="34" y="231" fill="#000" font-size="11">doses. Please visit Kisumu</text>
    <text x="34" y="246" fill="#000" font-size="11">County Referral Hospital.</text>
    <text x="34" y="265" fill="#666" font-size="10">USSD: *483*45# · 9:01 AM</text>

    <!-- Message 2 -->
    <rect x="24" y="295" width="232" height="115" rx="14" fill="#e5e5ea"/>
    <text x="34" y="317" fill="#000" font-size="11.5" font-weight="700">📅 Appointment Reminder</text>
    <text x="34" y="338" fill="#000" font-size="11">Kofi's next dose: Vitamin A 2</text>
    <text x="34" y="353" fill="#000" font-size="11">due Aug 22, 2024. Free at any</text>
    <text x="34" y="368" fill="#000" font-size="11">government clinic.</text>
    <text x="34" y="394" fill="#666" font-size="10">9:01 AM</text>

    <!-- Reply -->
    <rect x="24" y="425" width="180" height="60" rx="14" fill="#0084ff"/>
    <text x="34" y="448" fill="white" font-size="11">Asante. Will go to clinic</text>
    <text x="34" y="463" fill="white" font-size="11">today.</text>
    <text x="180" y="495" text-anchor="end" fill="#666" font-size="10">Delivered · 9:04</text>

    <!-- Input -->
    <rect x="24" y="540" width="232" height="36" rx="18" fill="#e5e5ea"/>
    <text x="40" y="563" fill="#999" font-size="11">iMessage</text>
  </g>

  <!-- USSD Phone mockup -->
  <g transform="translate(440, 110)">
    <rect x="0" y="0" width="260" height="600" rx="20" fill="#2c2c2c"/>
    <rect x="20" y="40" width="220" height="280" rx="6" fill="#003300"/>
    <text x="130" y="68" text-anchor="middle" fill="#7CFC00" font-size="11" font-family="monospace">ClimateShield Health</text>
    <line x1="30" y1="78" x2="230" y2="78" stroke="#7CFC00" stroke-width="1"/>
    <text x="30" y="100" fill="#7CFC00" font-size="11" font-family="monospace">Karibu Akinyi</text>
    <text x="30" y="120" fill="#7CFC00" font-size="11" font-family="monospace">Select option:</text>
    <text x="30" y="148" fill="#7CFC00" font-size="11" font-family="monospace">1. Next vaccination</text>
    <text x="30" y="168" fill="#7CFC00" font-size="11" font-family="monospace">2. Report missed dose</text>
    <text x="30" y="188" fill="#7CFC00" font-size="11" font-family="monospace">3. Confirm attendance</text>
    <text x="30" y="208" fill="#7CFC00" font-size="11" font-family="monospace">4. Climate alerts (3)</text>
    <text x="30" y="228" fill="#7CFC00" font-size="11" font-family="monospace">5. Find nearest clinic</text>
    <text x="30" y="256" fill="#7CFC00" font-size="11" font-family="monospace">0. Exit</text>
    <text x="30" y="290" fill="#7CFC00" font-size="11" font-family="monospace">Reply: _</text>
    <text x="130" y="310" text-anchor="middle" fill="#7CFC00" font-size="10" font-family="monospace">[Send] [Cancel]</text>

    <!-- Keypad -->
    <g fill="#444" font-family="monospace" font-size="14" font-weight="700">
      <rect x="20" y="340" width="60" height="42" rx="6"/><text x="50" y="367" text-anchor="middle" fill="white">1</text>
      <rect x="100" y="340" width="60" height="42" rx="6"/><text x="130" y="367" text-anchor="middle" fill="white">2</text>
      <rect x="180" y="340" width="60" height="42" rx="6"/><text x="210" y="367" text-anchor="middle" fill="white">3</text>

      <rect x="20" y="390" width="60" height="42" rx="6"/><text x="50" y="417" text-anchor="middle" fill="white">4</text>
      <rect x="100" y="390" width="60" height="42" rx="6"/><text x="130" y="417" text-anchor="middle" fill="white">5</text>
      <rect x="180" y="390" width="60" height="42" rx="6"/><text x="210" y="417" text-anchor="middle" fill="white">6</text>

      <rect x="20" y="440" width="60" height="42" rx="6"/><text x="50" y="467" text-anchor="middle" fill="white">7</text>
      <rect x="100" y="440" width="60" height="42" rx="6"/><text x="130" y="467" text-anchor="middle" fill="white">8</text>
      <rect x="180" y="440" width="60" height="42" rx="6"/><text x="210" y="467" text-anchor="middle" fill="white">9</text>

      <rect x="20" y="490" width="60" height="42" rx="6"/><text x="50" y="517" text-anchor="middle" fill="white">*</text>
      <rect x="100" y="490" width="60" height="42" rx="6"/><text x="130" y="517" text-anchor="middle" fill="white">0</text>
      <rect x="180" y="490" width="60" height="42" rx="6"/><text x="210" y="517" text-anchor="middle" fill="white">#</text>
    </g>
  </g>

  <!-- Explanation panel -->
  <g transform="translate(780, 130)">
    <text x="0" y="20" fill="#0D6E6E" font-size="20" font-weight="700">Why both?</text>

    <rect x="0" y="40" width="380" height="120" rx="10" fill="white" stroke="#e2e8f0"/>
    <text x="20" y="68" fill="#1E40AF" font-size="14" font-weight="700">📱 SMS — push, low-cost</text>
    <text x="20" y="92" fill="#475569" font-size="12">• Reaches any phone in Kenya</text>
    <text x="20" y="110" fill="#475569" font-size="12">• Costs ≈ KES 1 per message</text>
    <text x="20" y="128" fill="#475569" font-size="12">• Africa's Talking gateway,</text>
    <text x="20" y="146" fill="#475569" font-size="12">  sender ID "Jarida"</text>

    <rect x="0" y="180" width="380" height="120" rx="10" fill="white" stroke="#e2e8f0"/>
    <text x="20" y="208" fill="#7C3AED" font-size="14" font-weight="700">📞 USSD — pull, no internet</text>
    <text x="20" y="232" fill="#475569" font-size="12">• Dial *483*45# on any phone</text>
    <text x="20" y="250" fill="#475569" font-size="12">• Works on feature phones</text>
    <text x="20" y="268" fill="#475569" font-size="12">• Session-based, free for user</text>
    <text x="20" y="286" fill="#475569" font-size="12">• Self-service even offline</text>

    <rect x="0" y="320" width="380" height="120" rx="10" fill="white" stroke="#e2e8f0"/>
    <text x="20" y="348" fill="#059669" font-size="14" font-weight="700">🌍 Why this matters</text>
    <text x="20" y="372" fill="#475569" font-size="12">73% of rural Kenyan households</text>
    <text x="20" y="390" fill="#475569" font-size="12">have a phone but only 41% have</text>
    <text x="20" y="408" fill="#475569" font-size="12">a smartphone (KNBS, 2023). SMS</text>
    <text x="20" y="426" fill="#475569" font-size="12">+ USSD covers everyone.</text>
  </g>

  <text x="40" y="755" fill="#94a3b8" font-size="11">Source: Africa's Talking SMS+USSD pricing · KNBS Comprehensive Poverty Report 2023</text>
</svg>
